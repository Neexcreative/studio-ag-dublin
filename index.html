<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#faf9f7" />

    <title>Studio AG | Specialist Beauty Studio · Dublin</title>
    <meta
      name="description"
      content="Studio AG is a specialist beauty studio in the heart of Dublin home to the exclusive AG Method by Arieli Garcia. Facials, brows, lashes, waxing, nails and body treatments at 109 Grafton Street."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Studio AG | Specialist Beauty Studio · Dublin" />
    <meta
      property="og:description"
      content="Home of the exclusive AG Method by Arieli Garcia. Specialist beauty treatments at 109 Grafton Street, Dublin."
    />
    <!-- Update og:url and og:image to the live domain before launch -->
    <meta property="og:image" content="/images/studio-ag/hero/hero.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Studio AG | Specialist Beauty Studio · Dublin" />
    <meta
      name="twitter:description"
      content="Home of the exclusive AG Method by Arieli Garcia. Specialist beauty treatments at 109 Grafton Street, Dublin."
    />
    <meta name="twitter:image" content="/images/studio-ag/hero/hero.png" />

    <!-- Google Fonts: preconnect first, then stylesheet (faster than @import in CSS) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap"
    />

    <!-- Preload above-fold hero image -->
    <link rel="preload" as="image" href="/images/studio-ag/hero/hero.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
